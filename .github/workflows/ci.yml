name: Continuous integration

on:
  push:
    paths-ignore:
      - '**.md'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true
      PACKAGE_PATH: artifacts
      # Create NuGet package and upload to NuGet when a tag is pushed.
      CREATE_PACKAGE: ${{ startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --verbosity normal --configuration Release

      - name: Create NuGet package
        if: env.CREATE_PACKAGE == 'true'
        run: >
          dotnet pack
          --configuration Release
          --no-build
          --no-restore
          --output ${{ env.PACKAGE_PATH }}
          -property:RepositoryCommit=$GITHUB_SHA

      - name: Upload NuGet package
        if: env.CREATE_PACKAGE == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: package
          path: ${{ env.PACKAGE_PATH }}
          retention-days: 1

  publish:
    name: Publish NuGet Package
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      PACKAGE_PATH: package

    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_PATH }}

      - name: Push to NuGet
        run: >
          dotnet nuget
          push ${{ env.PACKAGE_PATH }}/*
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json

